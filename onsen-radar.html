<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>♨ 温泉レーダー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0400;
      color: #ff8800;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px 40px;
      gap: 18px;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      letter-spacing: 5px;
      text-shadow: 0 0 12px #ff5500, 0 0 24px #ff2200;
      color: #ffaa00;
    }
    .subtitle {
      font-size: 0.7rem;
      color: #884400;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* ===== DEVICE (outer casing) ===== */
    .device {
      position: relative;
      background: radial-gradient(circle at 35% 30%, #cc5500, #7a1800);
      border-radius: 50%;
      padding: 14px;
      box-shadow:
        0 0 0 3px #3a0800,
        0 0 0 5px #cc4400,
        0 0 30px rgba(255, 80, 0, 0.4),
        0 8px 30px rgba(0,0,0,0.9),
        inset 0 2px 6px rgba(255,180,100,0.15);
    }
    .device::before {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: transparent;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.7);
      pointer-events: none;
      z-index: 10;
    }

    /* ===== SCREEN ===== */
    .screen {
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #220800;
      box-shadow:
        inset 0 0 30px rgba(0,0,0,0.9),
        0 0 10px rgba(0,255,60,0.1);
    }
    canvas#radar {
      display: block;
    }

    /* ===== CONTROLS ===== */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn {
      background: radial-gradient(circle at 40% 35%, #dd5500, #7a1800);
      color: #ffdd00;
      border: 2px solid #ff6600;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(255,100,0,0.3), 0 3px 6px rgba(0,0,0,0.6);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
    }
    .btn:active {
      transform: scale(0.92);
      box-shadow: 0 0 6px rgba(255,100,0,0.2), 0 1px 3px rgba(0,0,0,0.6);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-search {
      border-radius: 22px;
      width: auto;
      height: 40px;
      padding: 0 18px;
      font-size: 0.85rem;
      letter-spacing: 2px;
    }
    .range-label {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffbb00;
      text-shadow: 0 0 8px #ff6600;
      min-width: 68px;
      text-align: center;
    }

    /* ===== STATUS ===== */
    #status {
      font-size: 0.78rem;
      color: #996633;
      letter-spacing: 1px;
      text-align: center;
      min-height: 1.1em;
    }
    #status.error { color: #ff4444; }
    #status.ok    { color: #44cc88; }

    /* ===== LOADING DOTS ===== */
    .dot-anim::after {
      content: '';
      display: inline-block;
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ===== ONSEN LIST ===== */
    #onsen-section {
      width: 100%;
      max-width: 380px;
    }
    .list-header {
      font-size: 0.78rem;
      color: #ff6600;
      letter-spacing: 2px;
      border-bottom: 1px solid #331100;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }
    .onsen-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      margin-bottom: 6px;
      border-left: 3px solid #ff4400;
      background: rgba(255,60,0,0.05);
      border-radius: 0 6px 6px 0;
      transition: background 0.2s;
      cursor: default;
    }
    .onsen-item:hover {
      background: rgba(255,60,0,0.13);
    }
    .blip-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ffdd44;
      box-shadow: 0 0 6px 2px rgba(255,200,0,0.6);
      flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }
    .onsen-name {
      flex: 1;
      font-size: 0.88rem;
      color: #ffaa44;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .onsen-dist {
      font-size: 0.75rem;
      color: #885533;
      white-space: nowrap;
    }
    .empty-msg {
      color: #553311;
      font-size: 0.85rem;
      text-align: center;
      padding: 14px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>♨ 温泉レーダー ♨</h1>
  <div class="subtitle">ONSEN RADAR  ·  DAY-USE FACILITIES</div>
</header>

<!-- Radar device -->
<div class="device">
  <div class="screen">
    <canvas id="radar" width="290" height="290"></canvas>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn" id="btn-minus" title="範囲を狭める">－</button>
  <span class="range-label" id="range-label">5 km</span>
  <button class="btn" id="btn-plus" title="範囲を広げる">＋</button>
  <button class="btn btn-search" id="btn-search">再検索</button>
</div>

<!-- Status line -->
<div id="status">現在地を取得中…</div>

<!-- Onsen list -->
<div id="onsen-section"></div>

<script>
// =====================================================================
//  CONSTANTS & STATE
// =====================================================================
const CANVAS  = document.getElementById('radar');
const CTX     = CANVAS.getContext('2d');
const W       = CANVAS.width;
const H       = CANVAS.height;
const CX      = W / 2;
const CY      = H / 2;
const R       = CX - 10;   // radar circle radius (px)

const RANGES   = [1, 2, 3, 5, 10, 20];   // km options
let   rangeIdx = 3;                        // default: 5 km

let onsens     = [];          // processed onsen objects
let blipBright = {};          // index -> brightness 0..1 (lit by sweep)
let sweepAngle = 0;           // radians, north-based clockwise [0, 2pi)
let lastTs     = null;

// 位置情報キャッシュ — 取得済みならすぐ使う
let cachedPos  = null;        // { lat, lon }

// AbortController — 前のリクエストをキャンセルして即座に再検索
let currentAbort = null;

const SWEEP_SPEED = 1.3;    // rad/s
const TRAIL_RAD   = 90 * Math.PI / 180;  // sweep trail length
const BLIP_DECAY  = 0.55;   // brightness decay per second
const BLIP_WIN    = 0.12;   // radians — sweep "hit" window

// Overpass mirrors
const OVERPASS_URLS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
];
let overpassIdx = 0;

// =====================================================================
//  UTILITIES
// =====================================================================
const toRad = d => d * Math.PI / 180;

function normalise(a) {
  a = a % (Math.PI * 2);
  return a < 0 ? a + Math.PI * 2 : a;
}

/** Haversine distance in km */
function haversine(lat1, lon1, lat2, lon2) {
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2
          + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/** Bearing from (lat1,lon1) to (lat2,lon2) — north-based clockwise [0, 2pi) */
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2))
           - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return normalise(Math.atan2(y, x));
}

/** north-based clockwise -> canvas angle (0 = east) */
const northToCanvas = a => a - Math.PI / 2;

/** (dist km, bearing rad) -> canvas (x, y) */
function toXY(dist, bear) {
  const radius = Math.min(dist / RANGES[rangeIdx], 1.0) * R;
  const angle  = northToCanvas(bear);
  return { x: CX + radius * Math.cos(angle), y: CY + radius * Math.sin(angle) };
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className   = cls;
}

function formatDist(km) {
  return km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(1)} km`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =====================================================================
//  RADAR DRAWING
// =====================================================================
function drawFrame(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;

  sweepAngle = normalise(sweepAngle + SWEEP_SPEED * dt);

  CTX.clearRect(0, 0, W, H);

  // Screen background
  const bg = CTX.createRadialGradient(CX, CY, 0, CX, CY, R);
  bg.addColorStop(0, '#002200');
  bg.addColorStop(1, '#000d00');
  CTX.fillStyle = bg;
  CTX.beginPath();
  CTX.arc(CX, CY, R, 0, Math.PI * 2);
  CTX.fill();

  // Sweep trail — fan of translucent arcs
  const STEPS = 48;
  for (let i = 0; i < STEPS; i++) {
    const t  = i / STEPS;
    const a1 = northToCanvas(sweepAngle - TRAIL_RAD * (1 - t));
    const a2 = northToCanvas(sweepAngle - TRAIL_RAD * (1 - (i + 1) / STEPS));
    CTX.beginPath();
    CTX.moveTo(CX, CY);
    CTX.arc(CX, CY, R, a1, a2);
    CTX.closePath();
    CTX.fillStyle = `rgba(0,255,70,${t * 0.21})`;
    CTX.fill();
  }

  // Distance rings
  [0.25, 0.5, 0.75, 1].forEach(f => {
    CTX.beginPath();
    CTX.arc(CX, CY, R * f, 0, Math.PI * 2);
    CTX.strokeStyle = 'rgba(0,180,50,0.28)';
    CTX.lineWidth = 1;
    CTX.stroke();
  });

  // Distance labels on rings
  CTX.fillStyle   = 'rgba(0,160,50,0.55)';
  CTX.font        = '9px Courier New';
  CTX.textAlign   = 'left';
  CTX.textBaseline = 'bottom';
  const km = RANGES[rangeIdx];
  [[0.25, 1], [0.5, 2], [0.75, 3]].forEach(([f, n]) => {
    const val = (km * f);
    const label = val < 1 ? `${Math.round(val*1000)}m` : `${val % 1 === 0 ? val : val.toFixed(1)}km`;
    CTX.fillText(label, CX + 3, CY - R * f + 1);
  });

  // Crosshair
  CTX.strokeStyle = 'rgba(0,180,50,0.35)';
  CTX.lineWidth   = 1;
  CTX.setLineDash([4, 6]);
  CTX.beginPath();
  CTX.moveTo(CX, CY - R); CTX.lineTo(CX, CY + R);
  CTX.moveTo(CX - R, CY); CTX.lineTo(CX + R, CY);
  CTX.stroke();
  CTX.setLineDash([]);

  // Outer ring
  CTX.beginPath();
  CTX.arc(CX, CY, R, 0, Math.PI * 2);
  CTX.strokeStyle = 'rgba(0,220,70,0.55)';
  CTX.lineWidth   = 2;
  CTX.stroke();

  // Compass labels
  CTX.fillStyle    = 'rgba(0,220,80,0.65)';
  CTX.font         = 'bold 10px Courier New';
  CTX.textAlign    = 'center';
  CTX.textBaseline = 'middle';
  CTX.fillText('N', CX,       CY - R + 11);
  CTX.fillText('S', CX,       CY + R - 11);
  CTX.fillText('E', CX + R - 11, CY);
  CTX.fillText('W', CX - R + 11, CY);

  // Sweep line
  const sa = northToCanvas(sweepAngle);
  CTX.beginPath();
  CTX.moveTo(CX, CY);
  CTX.lineTo(CX + R * Math.cos(sa), CY + R * Math.sin(sa));
  CTX.strokeStyle = 'rgba(80,255,100,0.9)';
  CTX.lineWidth   = 1.5;
  CTX.stroke();

  // Blips
  onsens.forEach((o, i) => {
    if (o.dist > RANGES[rangeIdx]) return;

    // check if sweep just passed over this blip
    const diff = normalise(sweepAngle - o.bearing);
    if (diff < BLIP_WIN) {
      blipBright[i] = 1.0;
    } else {
      blipBright[i] = Math.max(0, (blipBright[i] ?? 0) - BLIP_DECAY * dt);
    }

    const bri = blipBright[i] ?? 0;
    const pos = toXY(o.dist, o.bearing);

    // glow halo
    const grd = CTX.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 13);
    grd.addColorStop(0, `rgba(255,230,0,${bri * 0.75})`);
    grd.addColorStop(1, 'rgba(255,100,0,0)');
    CTX.beginPath();
    CTX.arc(pos.x, pos.y, 13, 0, Math.PI * 2);
    CTX.fillStyle = grd;
    CTX.fill();

    // core dot (always slightly visible so you can find them before sweep)
    CTX.beginPath();
    CTX.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
    CTX.fillStyle = `rgba(255,210,50,${0.3 + bri * 0.7})`;
    CTX.fill();
  });

  // Current position marker
  CTX.strokeStyle = '#ffffff';
  CTX.lineWidth   = 1.5;
  CTX.beginPath();
  CTX.moveTo(CX - 7, CY); CTX.lineTo(CX + 7, CY);
  CTX.moveTo(CX, CY - 7); CTX.lineTo(CX, CY + 7);
  CTX.stroke();
  CTX.beginPath();
  CTX.arc(CX, CY, 3, 0, Math.PI * 2);
  CTX.fillStyle = '#ffffff';
  CTX.fill();

  requestAnimationFrame(drawFrame);
}

// =====================================================================
//  GEOLOCATION
//  enableHighAccuracy: false → WiFi/セル測位で超高速
//  maximumAge: 300000        → ブラウザの5分以内キャッシュをそのまま使う
// =====================================================================
function getPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('このブラウザは位置情報に対応していません'));
      return;
    }
    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: false,
      timeout: 8000,
      maximumAge: 300000,
    });
  });
}

// =====================================================================
//  OVERPASS API — day-use onsen only
//  signal: AbortController のシグナル（キャンセル用）
// =====================================================================
async function fetchOnsens(lat, lon, km, signal) {
  const r = km * 1000;

  // クエリを4本に絞って高速化（tourism は正規表現で一括除外）
  const query = `
[out:json][timeout:15];
(
  node["amenity"="public_bath"](around:${r},${lat},${lon});
  way["amenity"="public_bath"](around:${r},${lat},${lon});
  node["bath:type"="onsen"]["tourism"!~"hotel|ryokan"]["amenity"!="hotel"](around:${r},${lat},${lon});
  way["bath:type"="onsen"]["tourism"!~"hotel|ryokan"]["amenity"!="hotel"](around:${r},${lat},${lon});
);
out center;
`.trim();

  let lastErr;
  for (let t = 0; t < OVERPASS_URLS.length; t++) {
    const url = OVERPASS_URLS[(overpassIdx + t) % OVERPASS_URLS.length];
    try {
      const res = await fetch(url, { method: 'POST', body: query, signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      overpassIdx = (overpassIdx + t) % OVERPASS_URLS.length;
      return json.elements;
    } catch (e) {
      if (e.name === 'AbortError') throw e;  // キャンセルはそのまま上げる
      lastErr = e;
    }
  }
  throw lastErr;
}

function processElements(elements, lat, lon) {
  const seen = new Set();
  const out  = [];

  for (const el of elements) {
    const eLat = el.lat ?? el.center?.lat;
    const eLon = el.lon ?? el.center?.lon;
    if (!eLat || !eLon) continue;

    const name = el.tags?.['name:ja'] || el.tags?.name || '名称不明の温泉';
    const key  = `${name}|${Math.round(eLat * 500)}|${Math.round(eLon * 500)}`;
    if (seen.has(key)) continue;
    seen.add(key);

    out.push({
      name,
      lat: eLat, lon: eLon,
      dist:    haversine(lat, lon, eLat, eLon),
      bearing: bearing(lat, lon, eLat, eLon),
      tags:    el.tags ?? {},
    });
  }

  return out.sort((a, b) => a.dist - b.dist);
}

// =====================================================================
//  ONSEN LIST
// =====================================================================
function renderList() {
  const section  = document.getElementById('onsen-section');
  const maxKm    = RANGES[rangeIdx];
  const inRange  = onsens.filter(o => o.dist <= maxKm);

  if (inRange.length === 0) {
    section.innerHTML = `<div class="empty-msg">♨ 範囲内に日帰り温泉が見つかりませんでした</div>`;
    return;
  }

  section.innerHTML = `
    <div class="list-header">♨ 日帰り温泉 &nbsp; ${inRange.length} 件検出</div>
    ${inRange.map(o => `
      <div class="onsen-item">
        <div class="blip-dot"></div>
        <div class="onsen-name">${escHtml(o.name)}</div>
        <div class="onsen-dist">${formatDist(o.dist)}</div>
      </div>
    `).join('')}
  `;
}

// =====================================================================
//  MAIN SEARCH
//  ・ボタンは一切 disabled にしない
//  ・前のリクエストを即キャンセルして新しい検索を開始
//  ・位置情報はキャッシュを即利用し、バックグラウンドで更新
// =====================================================================
async function search() {
  // 進行中のリクエストをキャンセル
  if (currentAbort) currentAbort.abort();
  currentAbort = new AbortController();
  const { signal } = currentAbort;

  const statusEl = document.getElementById('status');

  try {
    let lat, lon;

    if (cachedPos) {
      // ── キャッシュあり: 位置取得を待たずに即検索開始 ──
      ({ lat, lon } = cachedPos);
      // バックグラウンドで位置を更新（完了しても今の検索には影響しない）
      getPosition()
        .then(p => { cachedPos = { lat: p.coords.latitude, lon: p.coords.longitude }; })
        .catch(() => {});
    } else {
      // ── 初回: 位置情報が必要 ──
      setStatus('現在地を取得中…');
      statusEl.classList.add('dot-anim');
      const pos = await getPosition();
      if (signal.aborted) return;
      cachedPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      ({ lat, lon } = cachedPos);
    }

    setStatus(`検索中… (半径 ${RANGES[rangeIdx]} km)`);
    statusEl.classList.add('dot-anim');

    const elements = await fetchOnsens(lat, lon, RANGES[rangeIdx], signal);
    if (signal.aborted) return;

    onsens     = processElements(elements, lat, lon);
    blipBright = {};

    const count = onsens.filter(o => o.dist <= RANGES[rangeIdx]).length;
    statusEl.classList.remove('dot-anim');
    setStatus(
      count > 0
        ? `${count} 件の日帰り温泉を検出`
        : '範囲内に温泉が見つかりませんでした',
      count > 0 ? 'ok' : ''
    );
    renderList();

  } catch (err) {
    statusEl.classList.remove('dot-anim');
    if (err.name === 'AbortError') return;   // キャンセルは無視
    const msg = err.code === 1 ? '位置情報の許可が必要です'
              : err.code === 2 ? '位置情報を取得できませんでした'
              : err.code === 3 ? '位置情報の取得がタイムアウトしました'
              : `エラー: ${err.message}`;
    setStatus(msg, 'error');
    document.getElementById('onsen-section').innerHTML =
      `<div class="empty-msg">🔴 ${escHtml(msg)}</div>`;
  }
}

// =====================================================================
//  CONTROLS
// =====================================================================
function updateRangeLabel() {
  document.getElementById('range-label').textContent = `${RANGES[rangeIdx]} km`;
}

document.getElementById('btn-minus').addEventListener('click', () => {
  if (rangeIdx > 0) { rangeIdx--; updateRangeLabel(); search(); }
});
document.getElementById('btn-plus').addEventListener('click', () => {
  if (rangeIdx < RANGES.length - 1) { rangeIdx++; updateRangeLabel(); search(); }
});
document.getElementById('btn-search').addEventListener('click', () => search());

// =====================================================================
//  BOOT
// =====================================================================
updateRangeLabel();
requestAnimationFrame(drawFrame);
search();
</script>
</body>
</html>
